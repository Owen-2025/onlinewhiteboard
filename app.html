};

document.getElementById('choiceOpen').onclick = () => {
  closeNewBoardModal();
  document.getElementById('fileInput').click();
};

document.getElementById('choiceBlank').onclick = async () => {
  const hasContent = pages.some(p => (p.shapes || []).length) || state.shapes.length;
  if (hasContent) {
    closeNewBoardModal();
    const ok = await customConfirm('Anything not saved will be lost.', { title: 'Start a blank board?', okLabel: 'Start blank' });
    if (!ok) return;
  } else {
    closeNewBoardModal();
  }

  // leave any shared session — a fresh board is personal, not the group's
  if (shareId) {
    clearInterval(sharePollTimer);
    clearTimeout(sharePushTimer);
    shareId = null;
    updateShareUI();
    history.replaceState(null, '', '/app');
  }

  pages = [{ name: 'Page 1' }];
  pageIdx = 0;
  uid = 1;
  undoStack = []; redoStack = [];
  state.shapes = [];
  state.selectedIds.clear();
  state.panX = 0; state.panY = 0; state.zoom = 1;
  updatePageBar();
  updateHistoryButtons();
  document.getElementById('zoomLevel').textContent = '100%';
  render(); scheduleSave();
  toast('New blank board');
};

document.getElementById('clearBoard').onclick = async () => {
  menuDropdown.classList.remove('open');
  if (!state.shapes.length) return;
  const ok = await customConfirm('You can undo this afterward.', { title: 'Clear the whole board?', okLabel: 'Clear board' });
  if (!ok) return;
  pushHistory();
  state.shapes = [];
  state.selectedIds.clear();
  render(); scheduleSave();
  toast('Board cleared');
};

/* ---------- images: paste & drag-drop ---------- */
function addImageFromFile(file, wx, wy) {
  if (!file || !(file.type.startsWith('image/') || file.name?.toLowerCase().endsWith('.svg'))) return false;
  const reader = new FileReader();
  reader.onload = () => {
    const probe = new Image();
    probe.onload = () => {
      // SVGs without explicit dimensions can report 0×0 — fall back to a sane size
      const nw = probe.naturalWidth || 300, nh = probe.naturalHeight || 300;
      const maxDim = 480 / state.zoom;
      const k = Math.min(1, maxDim / Math.max(nw, nh));
      const w = nw * k, h = nh * k;
      pushHistory();
      const s = { id: uid++, type: 'image', x: wx - w / 2, y: wy - h / 2, w, h, src: reader.result, strokeWidth: 0, opacity: 1 };
      state.shapes.push(s);
      setTool('select');
      state.selectedIds = new Set([s.id]);
      render(); scheduleSave();
      toast('Image added');
    };
    probe.src = reader.result;
  };
  reader.readAsDataURL(file);
  return true;
}

addEventListener('paste', e => {
  if (e.target === textEditor) return;
  // 1) shapes copied from this app (system clipboard text)
  const text = e.clipboardData?.getData('text/plain');
  if (text && text.startsWith('{"app":"whiteboard"')) {
    try {
      const payload = JSON.parse(text);
      if (payload.app === 'whiteboard' && Array.isArray(payload.shapes)) {
        e.preventDefault();
        pasteShapes(payload.shapes);
        return;
      }
    } catch {}
  }
  // 2) image on the OS clipboard
  const items = e.clipboardData?.items || [];
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const c = toWorld(innerWidth / 2, innerHeight / 2);
      if (addImageFromFile(item.getAsFile(), c.x, c.y)) { e.preventDefault(); return; }
    }
  }
  // 3) in-memory fallback (clipboard API unavailable, e.g. file://)
  if (shapeClipboard) { e.preventDefault(); pasteShapes(shapeClipboard.shapes); }
});

addEventListener('dragover', e => e.preventDefault());
addEventListener('drop', e => {
  e.preventDefault();
  const wp = toWorld(e.clientX, e.clientY);
  for (const f of e.dataTransfer.files) if (addImageFromFile(f, wp.x, wp.y)) return;
});

document.getElementById('insertImage').onclick = () => {
  menuDropdown.classList.remove('open');
  document.getElementById('imgInput').click();
};
document.getElementById('imgInput').addEventListener('change', e => {
  const c = toWorld(innerWidth / 2, innerHeight / 2);
  [...e.target.files].forEach((f, i) => addImageFromFile(f, c.x + i * 24, c.y + i * 24));
  e.target.value = '';
});

document.getElementById('lockSel').onclick = () => { lockSelection(false); menuDropdown.classList.remove('open'); };
document.getElementById('lockRef').onclick = () => { lockSelection(true); menuDropdown.classList.remove('open'); };
document.getElementById('unlockAll').onclick = () => { unlockAll(); menuDropdown.classList.remove('open'); };
document.getElementById('darkToggle').onclick = () => { toggleDark(); menuDropdown.classList.remove('open'); };

document.getElementById('snapToggle').onclick = () => { toggleSnap(); menuDropdown.classList.remove('open'); };
document.getElementById('presenterToggle').onclick = () => { menuDropdown.classList.remove('open'); togglePresenter(); };

document.getElementById('toFront').onclick = () => { reorderSelection('front'); menuDropdown.classList.remove('open'); };
document.getElementById('toBack').onclick = () => { reorderSelection('back'); menuDropdown.classList.remove('open'); };

document.getElementById('undoBtn').onclick = undo;
document.getElementById('redoBtn').onclick = redo;

/* ---------- realtime collaboration (shared boards) ---------- */
let shareId = null;
let shareRev = 0;
let sharePushTimer = null;
let sharePollTimer = null;
let sharePushing = false;

function updateShareUI() {
  document.getElementById('shareLabel').textContent = shareId ? 'Copy share link' : 'Share & collaborate';
  document.getElementById('shareStatus').textContent = shareId ? 'live ●' : '';
}

function shareLink() { return location.origin + '/app?share=' + shareId; }

function applyRemoteDoc(doc) {
  const keepUndo = undoStack, keepRedo = redoStack;
  pages = doc.pages;
  pageIdx = Math.min(pageIdx, pages.length - 1);
  const p = pages[pageIdx];
  state.shapes = p.shapes || [];
  // deliberately keep this client's own pan/zoom — every collaborator has their own viewport
  uid = Math.max(uid, pages.reduce((m, pg) => (pg.shapes || []).reduce((m2, s) => Math.max(m2, s.id || 0), m), 0) + 1);
  undoStack = keepUndo; redoStack = keepRedo;
  state.selectedIds = new Set([...state.selectedIds].filter(id => state.shapes.some(s => s.id === id)));
  updatePageBar();
  render();
}

function scheduleSharePush() {
  clearTimeout(sharePushTimer);
  sharePushTimer = setTimeout(async () => {
    if (!shareId) return;
    sharePushing = true;
    try {
      const r = await fetch('/api/share', {
        method: 'PUT',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ id: shareId, doc: currentDoc() }),
      });
      const d = await r.json();
      if (d.rev) shareRev = d.rev;
    } catch {}
    sharePushing = false;
  }, 600);
}

async function sharePoll() {
  if (!shareId || sharePushing) return;
  try {
    const r = await fetch(`/api/share?id=${shareId}&rev=${shareRev}`);
    if (!r.ok) return;
    const d = await r.json();
    // don't yank the board out from under an in-progress gesture or text edit
    if (d.doc && d.rev > shareRev && !action && !editingShape && textEditor.style.display !== 'block') {
      shareRev = d.rev;
      applyRemoteDoc(d.doc);
    }
  } catch {}
}

function startPolling() {
  clearInterval(sharePollTimer);
  sharePollTimer = setInterval(sharePoll, 2000);
  updateShareUI();
}

async function startSharing() {
  try {
    const r = await fetch('/api/share', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ doc: currentDoc() }),
    });
    const d = await r.json();
    if (!d.id) throw new Error();
    shareId = d.id;
    shareRev = d.rev;
    uid += Math.floor(Math.random() * 1e6); // avoid shape-id collisions between collaborators
    history.replaceState(null, '', '/app?share=' + shareId);
    startPolling();
    await navigator.clipboard.writeText(shareLink()).catch(() => {});
    toast('Link copied — anyone with it can draw with you live');
  } catch {
    toast('Could not start sharing — are you online?');
  }
}

async function collabJoin(id) {
  try {
    const r = await fetch(`/api/share?id=${id}&rev=0`);
    if (!r.ok) throw new Error();
    const d = await r.json();
    shareId = id;
    shareRev = d.rev;
    uid = 1;
    pageIdx = Math.min(d.doc.pageIdx || 0, d.doc.pages.length - 1);
    applyRemoteDoc(d.doc);
    uid += Math.floor(Math.random() * 1e6);
    startPolling();
    toast('Joined shared board — changes sync live');
    return true;
  } catch {
    toast('Shared board not found');
    history.replaceState(null, '', '/app');
    return false;
  }
}

document.getElementById('shareBtn').onclick = async () => {
  menuDropdown.classList.remove('open');
  if (shareId) {
    await navigator.clipboard.writeText(shareLink()).catch(() => {});
    toast('Share link copied');
  } else {
    startSharing();
  }
};

/* ---------- cloud sync ---------- */
let cloudUser = null;
let cloudTimer = null;

function updateAccountUI(status) {
  const label = document.getElementById('accountLabel');
  const signOut = document.getElementById('signOutItem');
  const sync = document.getElementById('syncStatus');
  if (cloudUser) {
    label.textContent = cloudUser.email;
    signOut.style.display = '';
    sync.textContent = status || '';
  } else {
    label.textContent = 'Sign in / Sign up';
    signOut.style.display = 'none';
    sync.textContent = '';
  }
}

function currentDoc() {
  stashCurrentPage();
  return {
    pages: pages.map(p => ({ name: p.name, shapes: p.shapes || [], panX: p.panX || 0, panY: p.panY || 0, zoom: p.zoom || 1 })),
    pageIdx, snap: state.snap, dark: !!state.dark,
  };
}

function scheduleCloudSave() {
  if (!cloudUser) return;
  clearTimeout(cloudTimer);
  cloudTimer = setTimeout(async () => {
    try {
      updateAccountUI('saving…');
      const r = await fetch('/api/board', {
        method: 'PUT',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(currentDoc()),
      });
      updateAccountUI(r.ok ? 'saved ✓' : 'save failed');
    } catch {
      updateAccountUI('offline');
    }
  }, 1500);
}

async function cloudInit() {
  try {
    const me = await (await fetch('/api/auth')).json();
    if (!me.user) { updateAccountUI(); return; }
    cloudUser = me.user;
    const b = await (await fetch('/api/board')).json();
    if (b.doc && Array.isArray(b.doc.pages) && b.doc.pages.length) {
      pages = b.doc.pages;
      pageIdx = Math.min(b.doc.pageIdx || 0, pages.length - 1);
      state.snap = !!b.doc.snap;
      state.dark = !!b.doc.dark;
      uid = pages.reduce((m, p) => (p.shapes || []).reduce((m2, s) => Math.max(m2, s.id || 0), m), 0) + 1;
      loadPage(pageIdx);
      document.getElementById('snapCheck').textContent = state.snap ? '✓' : '';
      document.getElementById('darkCheck').textContent = state.dark ? '✓' : '';
      document.body.classList.toggle('dark', state.dark);
      scheduleSave(); // mirror the cloud copy locally
      updateAccountUI('saved ✓');
    } else {
      // first sign-in on this device: push the local board up
      scheduleCloudSave();
      updateAccountUI();
    }
  } catch {
    updateAccountUI('offline');
  }
}

document.getElementById('accountItem').onclick = () => {
  menuDropdown.classList.remove('open');
  if (!cloudUser) location.href = '/?login=1';
};
document.getElementById('signOutItem').onclick = async () => {
  menuDropdown.classList.remove('open');
  try {
    await fetch('/api/auth', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ action: 'logout' }) });
  } catch {}
  cloudUser = null;
  updateAccountUI();
  toast('Signed out — board stays on this device');
};

/* ---------- boot ---------- */
document.getElementById('pagePrev').onclick = () => gotoPage(pageIdx - 1);
document.getElementById('pageNext').onclick = () => gotoPage(pageIdx + 1);
document.getElementById('pageAdd').onclick = addPage;
document.getElementById('pageDel').onclick = deletePage;
addEventListener('resize', resize);
resize();
setTool('pen');

loadSaved().finally(() => {
  document.getElementById('snapCheck').textContent = state.snap ? '✓' : '';
  document.getElementById('darkCheck').textContent = state.dark ? '✓' : '';
  document.body.classList.toggle('dark', !!state.dark);
  updatePageBar();
  updateHistoryButtons();
  document.getElementById('zoomLevel').textContent = Math.round(state.zoom * 100) + '%';
  render();
  const shareParam = new URLSearchParams(location.search).get('share');
  if (shareParam) {
    collabJoin(shareParam).then(ok => { if (!ok) cloudInit(); });
  } else {
    cloudInit();
  }
});
